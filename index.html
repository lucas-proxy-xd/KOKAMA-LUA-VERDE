<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokama – Rede de Saberes 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --g1:#0a1f0a;--g2:#0f2d0f;--g3:#1a3d1a;
  --verde:#2d7a2d;--verde-claro:#4aaa4a;--folha:#6dcf6d;
  --ouro:#f5c518;--ouro-claro:#ffe066;--ouro-dim:#b8940f;
  --cyan:#00e5ff;--coral:#ff6b35;
  --glass:rgba(255,255,255,0.06);--glass2:rgba(255,255,255,0.10);
  --border:rgba(109,207,109,0.18);--border2:rgba(245,197,24,0.4);
  --txt:#f0f7f0;--txt2:#a0b0a0;
}
*{margin:0;padding:0;box-sizing:border-box;outline:none;}
body{
  background:var(--g1);color:var(--txt);
  font-family:'Inter',sans-serif;overflow-x:hidden;
  line-height:1.6;
}
#canvas-bg{position:fixed;top:0;left:0;z-index:-1;pointer-events:none;}

header{
  padding:100px 20px 60px;text-align:center;
  background:radial-gradient(circle at center, var(--g2), var(--g1));
}
.badge{
  display:inline-block;padding:6px 16px;border-radius:30px;
  background:var(--glass);border:1px solid var(--border);
  font-size:12px;font-weight:600;color:var(--ouro);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;
}
h1{
  font-family:'Playfair Display',serif;font-size:clamp(40px,8vw,85px);
  font-weight:900;line-height:1;margin-bottom:20px;
  background:linear-gradient(to bottom, #fff, #a0b0a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* SEÇÃO MURAL */
.section-title{text-align:center;margin-bottom:40px;padding:0 20px;}
.section-title h2{font-family:'Playfair Display',serif;font-size:32px;color:var(--ouro);}

.mural-grid{
  display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:25px;max-width:1200px;margin:0 auto 60px;padding:0 20px;
}
.mural-card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:22px;overflow:hidden;position:relative;
  transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.mural-card:hover{transform:translateY(-10px);border-color:var(--ouro-claro);}
.mural-card img{width:100%;height:300px;object-fit:cover;display:block;}

.btn-del{
  position:absolute;top:10px;right:10px;background:rgba(255,0,0,0.6);
  border:none;color:white;padding:8px 12px;border-radius:12px;
  cursor:pointer;font-size:12px;backdrop-filter:blur(5px);
}

/* ÁREA ADMIN */
.admin-trigger{
  position:fixed;bottom:20px;right:20px;background:var(--ouro);
  width:50px;height:50px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);z-index:100;
}
#admin-panel{
  position:fixed;bottom:80px;right:20px;background:var(--g3);
  padding:20px;border-radius:20px;border:1px solid var(--ouro);
  display:none;z-index:100;width:300px;box-shadow:0 20px 40px rgba(0,0,0,0.5);
}
.admin-panel input{
  width:100%;padding:10px;margin-bottom:10px;border-radius:8px;
  border:1px solid var(--border);background:var(--g1);color:white;
}
.btn-upload{
  width:100%;padding:12px;background:var(--verde);color:white;
  border:none;border-radius:10px;cursor:pointer;font-weight:700;
}
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<header>
  <div class="badge">Projeto 2026</div>
  <h1>Kokama</h1>
  <p>Rede de Saberes & Ancestralidade</p>
</header>

<div class="section-title">
  <h2>Mural da Comunidade</h2>
  <p>Espaço Admin para atualizações</p>
</div>

<div class="mural-grid" id="mural-container">
  </div>

<div class="admin-trigger" onclick="toggleAdmin()">🔑</div>

<div id="admin-panel">
  <h3 style="margin-bottom:15px; color:var(--ouro)">Área Admin</h3>
  <input type="password" id="senha-admin" placeholder="Senha Mestre">
  <input type="file" id="file-input" accept="image/*">
  <div id="status-upload" style="font-size:12px; margin-bottom:10px; color:var(--ouro-claro)"></div>
  <button class="btn-upload" onclick="iniciarUpload()">Publicar no Mural</button>
</div>

<script>
const scriptURL = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI"; // COLE SUA URL AQUI

function toggleAdmin(){
  const panel = document.getElementById('admin-panel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}

// 1. Carregar Mural ao Iniciar
async function carregarMural() {
  const resp = await fetch(scriptURL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getMural', senha: 'KOKAMA2026' }) // Get não precisa de senha real no meu script mas enviamos por padrão
  });
  const data = await resp.json();
  renderizar(data.mural);
}

function renderizar(lista) {
  const container = document.getElementById('mural-container');
  if(!lista || lista.length === 0){
    container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Nenhuma imagem publicada.</p>";
    return;
  }
  container.innerHTML = lista.map(img => `
    <div class="mural-card">
      <img src="${img.url}">
      <button class="btn-del" onclick="deletar('${img.id}')">Excluir</button>
    </div>
  `).join('');
}

// 2. Lógica de Upload com Compressão
async function iniciarUpload() {
  const fileInput = document.getElementById('file-input');
  const senha = document.getElementById('senha-admin').value;
  const status = document.getElementById('status-upload');

  if (!fileInput.files[0] || !senha) {
    alert("Selecione uma foto e digite a senha!");
    return;
  }

  status.innerText = "Processando imagem...";
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;
    img.onload = function() {
      // Compressão Canvas
      const canvas = document.createElement('canvas');
      const MAX_W = 800;
      let w = img.width;
      let h = img.height;
      if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      
      const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      enviar(base64, file.name, senha);
    };
  };
  reader.readAsDataURL(file);
}

async function enviar(base64, name, senha) {
  const status = document.getElementById('status-upload');
  status.innerText = "Enviando para o Drive...";

  const resp = await fetch(scriptURL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'upload',
      senha: senha,
      base64: base64,
      name: name,
      type: 'image/jpeg'
    })
  });

  const res = await resp.json();
  if (res.ok) {
    status.innerText = "Publicado!";
    renderizar(res.mural);
    document.getElementById('file-input').value = "";
  } else {
    alert("Erro: " + res.erro);
    status.innerText = "";
  }
}

// 3. Deletar Imagem
async function deletar(id) {
  const senha = prompt("Digite a senha de ADMIN para excluir:");
  if (!senha) return;

  const resp = await fetch(scriptURL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', senha: senha, id: id })
  });
  
  const res = await resp.json();
  if (res.ok) {
    renderizar(res.mural);
  } else {
    alert(res.erro);
  }
}

// Inicia
carregarMural();

// --- ANIMAÇÃO DOS PÁSSAROS/FOLHAS (O SEU CÓDIGO ORIGINAL) ---
const canvas = document.getElementById('canvas-bg');
const cx = canvas.getContext('2d');
let W, H, animais = [];

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

class Passaro {
  constructor(){ this.reset(); }
  reset(){
    this.x = -50; this.y = Math.random() * H * 0.5;
    this.v = 1 + Math.random() * 2;
    this.amp = 10 + Math.random() * 20;
    this.f = 0.02 + Math.random() * 0.03;
    this.t = 0;
  }
  update(){
    this.x += this.v; this.t += this.f;
    if(this.x > W + 50) this.reset();
  }
  draw(){
    const dy = Math.sin(this.t) * this.amp;
    cx.fillStyle = 'rgba(255,255,255,0.2)';
    cx.beginPath();
    cx.arc(this.x, this.y + dy, 2, 0, Math.PI*2);
    cx.fill();
  }
}

function init() {
  for(let i=0; i<5; i++) animais.push(new Passaro());
}
init();

function loop(){
  cx.clearRect(0,0,W,H);
  animais.forEach(a => { a.update(); a.draw(); });
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
