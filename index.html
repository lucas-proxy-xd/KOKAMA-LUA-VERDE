<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mural de Avisos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

    :root {
      --primary: #2d7a2d;
      --gold: #f5c518;
      --bg: #0a1f0a;
      --glass: rgba(255, 255, 255, 0.05);
      --text: #f0f7f0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 { font-weight: 800; letter-spacing: -1px; color: var(--gold); }

    /* GRID DO MURAL */
    #mural-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1200px;
      margin-top: 30px;
    }

    .card {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: 0.4s ease;
      position: relative;
    }

    .card:hover { transform: translateY(-10px); border-color: var(--gold); }

    .card img { width: 100%; height: 250px; object-fit: cover; }

    .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }

    .btn-del {
      background: rgba(255,0,0,0.2);
      border: none; color: #ff4d4d;
      padding: 5px 10px; border-radius: 8px; cursor: pointer;
    }

    /* ÁREA DE UPLOAD ADMIN */
    .admin-section {
      background: var(--glass);
      padding: 25px;
      border-radius: 24px;
      border: 1px solid var(--primary);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    .upload-zone {
      border: 2px dashed var(--primary);
      padding: 30px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
      margin: 15px 0;
    }

    .upload-zone:hover, .upload-zone.dragover { background: rgba(45, 122, 45, 0.2); border-color: var(--gold); }

    input[type="password"] {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 10px; border-radius: 8px; width: 80%; margin-bottom: 10px;
    }

    #preview-img { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }

    .loading { color: var(--gold); font-weight: bold; display: none; }
  </style>
</head>
<body>

  <h1>🌿 MURAL COMUNITÁRIO</h1>

  <div class="admin-section">
    <h3>Painel do Administrador</h3>
    <input type="password" id="senha" placeholder="Senha Admin">
    
    <div class="upload-zone" id="drop-zone">
      <p id="upload-msg">Arraste uma foto ou clique aqui</p>
      <input type="file" id="file-input" hidden accept="image/*">
      <img id="preview-img">
    </div>

    <div id="status" class="loading">Processando...</div>
  </div>

  <div id="mural-container"></div>

  <script>
    const WEB_APP_URL = "SUA_URL_DO_DEPLOY_AQUI"; // Opcional se usar google.script.run
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview-img');
    const statusTxt = document.getElementById('status');

    // Carregar Mural ao Iniciar
    async function loadMural() {
      const resp = await fetch(`${window.location.href.split('?')[0]}?action=getMural`);
      const data = await resp.json();
      renderMural(data.mural);
    }

    function renderMural(items) {
      const container = document.getElementById('mural-container');
      container.innerHTML = items.map(img => `
        <div class="card">
          <img src="${img.url}">
          <div class="card-info">
            <span>📅 ${img.data}</span>
            <button class="btn-del" onclick="deleteImg('${img.id}')">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    // Drag & Drop
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
      e.preventDefault();
      handleFile(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        document.getElementById('upload-msg').innerText = "Foto selecionada!";
        compressAndUpload(file);
      };
      reader.readAsDataURL(file);
    }

    function compressAndUpload(file) {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const MAX_W = 800;
        let w = img.width; let h = img.height;
        if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        
        const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        upload(base64, file.name);
      };
    }

    async function upload(base64, name) {
      const senha = document.getElementById('senha').value;
      if(!senha) { alert("Digite a senha!"); return; }

      statusTxt.style.display = 'block';
      const resp = await fetch(window.location.href, {
        method: 'POST',
        body: JSON.stringify({ action: 'upload', senha, base64, name, type: 'image/jpeg' })
      });
      const data = await resp.json();
      
      statusTxt.style.display = 'none';
      if(data.ok) {
        renderMural(data.mural);
        preview.style.display = 'none';
        document.getElementById('upload-msg').innerText = "Publicado com sucesso!";
      } else {
        alert("Erro: " + data.erro);
      }
    }

    async function deleteImg(id) {
      const senha = document.getElementById('senha').value;
      if(!senha) { alert("Senha necessária para excluir"); return; }
      if(!confirm("Deseja remover esta imagem?")) return;

      const resp = await fetch(window.location.href, {
        method: 'POST',
        body: JSON.stringify({ action: 'delete', senha, id })
      });
      const data = await resp.json();
      if(data.ok) renderMural(data.mural);
    }

    loadMural();
  </script>
</body>
</html>
