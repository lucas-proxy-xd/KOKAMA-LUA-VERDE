<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokama Premium</title>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#071a07;
  color:#fff;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f2d0f;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h2{margin-bottom:10px;}

/* PROXIMA AULA */
.highlight{
  text-align:center;
  background:linear-gradient(135deg,#2d7a2d,#4aaa4a);
}

/* SEMANA */
.week{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.day{
  background:#123;
  border-radius:14px;
  padding:12px;
  text-align:center;
  transition:.3s;
}

.day:hover{transform:scale(1.05);}

.x{
  color:red;
  font-size:20px;
  font-weight:bold;
}

.ok{
  color:#6dcf6d;
}

/* MURAL */
.mural{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.mural img{
  width:100%;
  border-radius:12px;
}

/* COLLAPSE */
.section-header{
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.hidden{display:none;}

</style>
</head>

<body>
<div class="container">

<!-- PROXIMA AULA -->
<div class="card highlight">
  <h2>🔥 Próxima Aula</h2>
  <p id="proxima">Carregando...</p>
</div>

<!-- SEMANA -->
<div class="card">
  <div class="section-header" onclick="toggle('semana')">
    <h2>📅 Semana</h2>
    <span>▼</span>
  </div>
  <div id="semana" class="week"></div>
</div>

<!-- MURAL -->
<div class="card">
  <div class="section-header" onclick="toggle('mural')">
    <h2>📸 Mural</h2>
    <span>▼</span>
  </div>
  <div id="mural" class="mural"></div>
</div>

</div>

<script>

// EXEMPLO DE DIAS
const dias = [
  {nome:'Seg',tem:true},
  {nome:'Ter',tem:false},
  {nome:'Qua',tem:true},
  {nome:'Qui',tem:false},
  {nome:'Sex',tem:true},
  {nome:'Sáb',tem:false},
  {nome:'Dom',tem:false},
];

function renderSemana(){
  const el = document.getElementById('semana');
  el.innerHTML='';

  dias.forEach(d=>{
    el.innerHTML += `
      <div class="day">
        <strong>${d.nome}</strong><br>
        ${d.tem ? '<span class="ok">✔ Aula</span>' : '<span class="x">✖</span>'}
      </div>
    `;
  });
}

function toggle(id){
  const el = document.getElementById(id);
  el.classList.toggle('hidden');
}

// MOCK MURAL
function renderMural(){
  const mural = document.getElementById('mural');
  mural.innerHTML = `
    <img src="https://placehold.co/300x200">
    <img src="https://placehold.co/300x200">
    <img src="https://placehold.co/300x200">
  `;
}

renderSemana();
renderMural();

</script>

</body>
</html>
