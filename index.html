<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokama</title>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#071a07;
  color:#fff;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f2d0f;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
}

.mural{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.mural img{
  width:100%;
  border-radius:10px;
}

input,textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:#fff;
}

.preview{
  max-width:100%;
  display:none;
  margin-top:10px;
  border-radius:10px;
}

.x{color:red;font-weight:bold;}
.ok{color:#6dcf6d;}

</style>
</head>

<body>

<div class="container">

<h2>📅 Semana</h2>
<div id="semana"></div>

<h2>📸 Mural</h2>

<input type="file" id="file">
<img id="preview" class="preview">
<input type="text" id="titulo" placeholder="Título">
<textarea id="legenda" placeholder="Legenda"></textarea>
<button onclick="enviar()">Publicar</button>

<p id="msg"></p>

<div id="mural" class="mural"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby2QQCs141ukr8bcsDjshSnaHcG1LTHZfGA0K0NwE16bNu4E9NcIGPBCGQgf_gFtBxP/exec";

let imagemBase64 = "";

// PREVIEW + COMPRESSÃO
document.getElementById("file").addEventListener("change", e=>{
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){

      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;

      const max = 800;
      if(w > max){
        h *= max/w;
        w = max;
      }

      canvas.width = w;
      canvas.height = h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      imagemBase64 = canvas.toDataURL("image/jpeg",0.7);

      const preview = document.getElementById("preview");
      preview.src = imagemBase64;
      preview.style.display="block";
    };
    img.src = ev.target.result;
  };

  reader.readAsDataURL(file);
});

// ENVIAR
async function enviar(){
  const titulo = document.getElementById("titulo").value;
  const legenda = document.getElementById("legenda").value;
  const msg = document.getElementById("msg");

  if(!imagemBase64 || !titulo){
    msg.innerText="Imagem e título obrigatórios";
    return;
  }

  msg.innerText="Enviando...";

  const up = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      base64: imagemBase64.split(",")[1],
      type:"image/jpeg",
      name:"img.jpg"
    })
  });

  const data = await up.json();

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"saveMural",
      url:data.url,
      titulo,
      legenda,
      id:data.id
    })
  });

  msg.innerText="Publicado!";
  carregar();
}

// CARREGAR
async function carregar(){
  const res = await fetch(API+"?action=getMural");
  const data = await res.json();

  const mural = document.getElementById("mural");
  mural.innerHTML="";

  data.mural.forEach((item,i)=>{
    mural.innerHTML += `
      <div class="card">
        <img src="${item.url}">
        <h4>${item.titulo}</h4>
        <p>${item.legenda||""}</p>
        <button onclick="remover(${i})">Remover</button>
      </div>
    `;
  });
}

// REMOVER
async function remover(i){
  const res = await fetch(API+"?action=getMural");
  const data = await res.json();

  let mural = data.mural;
  const removido = mural.splice(i,1)[0];

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({delete:true,id:removido.id})
  });

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"updateMural",mural})
  });

  carregar();
}

// SEMANA (❌ automático)
const dias = [
  {nome:'Seg',inf:true},
  {nome:'Ter',inf:false},
  {nome:'Qua',inf:true},
  {nome:'Qui',inf:false},
  {nome:'Sex',inf:true},
  {nome:'Sáb',inf:false},
  {nome:'Dom',inf:false},
];

function renderSemana(){
  const el = document.getElementById("semana");

  el.innerHTML = dias.map(d=>`
    <div>
      ${d.nome} - ${d.inf ? '<span class=\"ok\">✔ Informática</span>' : '<span class=\"x\">✖</span>'}
    </div>
  `).join('');
}

renderSemana();
carregar();

</script>

</body>
</html>
