<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokama Premium</title>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#071a07;
  color:#fff;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f2d0f;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.highlight{
  text-align:center;
  background:linear-gradient(135deg,#2d7a2d,#4aaa4a);
}

/* SEMANA */
.week{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.day{
  background:#123;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.x{color:red;font-size:20px;}
.ok{color:#6dcf6d}

/* MURAL */
.mural{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* UPLOAD */
input, textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:#fff;
  cursor:pointer;
}

.preview{
  max-height:200px;
  margin-top:10px;
  display:none;
}

/* collapse */
.section-header{
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}
.hidden{display:none;}

</style>
</head>

<body>

<div class="container">

<!-- PROXIMA -->
<div class="card highlight">
  <h2>🔥 Próxima Aula</h2>
  <p>Segunda - Informática</p>
</div>

<!-- SEMANA -->
<div class="card">
  <div class="section-header" onclick="toggle('semana')">
    <h2>📅 Semana</h2><span>▼</span>
  </div>
  <div id="semana" class="week"></div>
</div>

<!-- MURAL -->
<div class="card">
  <div class="section-header" onclick="toggle('mural')">
    <h2>📸 Mural</h2><span>▼</span>
  </div>

  <!-- UPLOAD -->
  <input type="file" id="file" accept="image/*">
  <img id="preview" class="preview">
  <input type="text" id="titulo" placeholder="Título">
  <textarea id="legenda" placeholder="Legenda"></textarea>
  <button onclick="enviar()">Publicar</button>
  <p id="msg"></p>

  <div id="mural" class="mural"></div>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycby2QQCs141ukr8bcsDjshSnaHcG1LTHZfGA0K0NwE16bNu4E9NcIGPBCGQgf_gFtBxP/exec";

let imagemBase64 = "";

// ───────── PREVIEW + COMPRESSÃO
document.getElementById("file").addEventListener("change", e=>{
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){

      const canvas = document.createElement("canvas");
      let w = img.width;
      let h = img.height;

      const max = 800;
      if(w > max){
        h *= max/w;
        w = max;
      }

      canvas.width = w;
      canvas.height = h;

      canvas.getContext("2d").drawImage(img,0,0,w,h);

      imagemBase64 = canvas.toDataURL("image/jpeg",0.7);

      const preview = document.getElementById("preview");
      preview.src = imagemBase64;
      preview.style.display="block";
    };
    img.src = ev.target.result;
  };

  reader.readAsDataURL(file);
});

// ───────── ENVIAR
async function enviar(){
  const titulo = document.getElementById("titulo").value;
  const legenda = document.getElementById("legenda").value;
  const msg = document.getElementById("msg");

  if(!imagemBase64 || !titulo){
    msg.innerText="Imagem e título obrigatórios";
    return;
  }

  msg.innerText="Enviando...";

  const up = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      base64: imagemBase64.split(",")[1],
      type:"image/jpeg",
      name:"img.jpg"
    })
  });

  const data = await up.json();

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"saveMural",
      url:data.url,
      titulo,
      legenda,
      id:data.id
    })
  });

  msg.innerText="Publicado!";
  carregar();
}

// ───────── CARREGAR MURAL
async function carregar(){
  const res = await fetch(API+"?action=getMural");
  const data = await res.json();

  const mural = document.getElementById("mural");
  mural.innerHTML="";

  data.mural.forEach((item,i)=>{
    mural.innerHTML += `
      <div class="card">
        <img src="${item.url}">
        <h4>${item.titulo}</h4>
        <p>${item.legenda||""}</p>
        <button onclick="remover(${i})">Remover</button>
      </div>
    `;
  });
}

// ───────── REMOVER
async function remover(i){
  const res = await fetch(API+"?action=getMural");
  const data = await res.json();

  let mural = data.mural;
  const removido = mural.splice(i,1)[0];

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({delete:true,id:removido.id})
  });

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"updateMural",mural})
  });

  carregar();
}

// ───────── SEMANA (X vermelho)
const dias = [
  {nome:'Seg',tem:true},
  {nome:'Ter',tem:false},
  {nome:'Qua',tem:true},
  {nome:'Qui',tem:false},
  {nome:'Sex',tem:true},
  {nome:'Sáb',tem:false},
  {nome:'Dom',tem:false},
];

function renderSemana(){
  const el = document.getElementById('semana');
  el.innerHTML='';

  dias.forEach(d=>{
    el.innerHTML += `
      <div class="day">
        ${d.nome}<br>
        ${d.tem ? '<span class="ok">✔</span>' : '<span class="x">✖</span>'}
      </div>
    `;
  });
}

// ───────── UI
function toggle(id){
  document.getElementById(id).classList.toggle('hidden');
}

renderSemana();
carregar();

</script>

</body>
</html>
