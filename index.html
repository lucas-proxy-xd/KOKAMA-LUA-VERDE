<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokama – Rede de Saberes 2026</title>
<style>
/* ... Mantenho seu CSS original dos pássaros e fontes ... */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --g1:#0a1f0a;--g2:#0f2d0f;--verde:#2d7a2d;--ouro:#f5c518;--txt:#f0f7f0;
  --glass:rgba(255,255,255,0.06);--border:rgba(109,207,109,0.18);
}
body{background:var(--g1);color:var(--txt);font-family:'Inter',sans-serif;margin:0;overflow-x:hidden;}
#canvas-bg{position:fixed;top:0;left:0;z-index:-1;}

header{padding:80px 20px;text-align:center;}
h1{font-family:'Playfair Display',serif;font-size:clamp(40px,8vw,80px);margin-bottom:10px;color:var(--ouro);}

/* CALENDÁRIO SEMANAL */
.calendario-container{
  max-width: 900px; margin: 0 auto 50px; padding: 20px;
  background: var(--glass); border-radius: 24px; border: 1px solid var(--border);
  backdrop-filter: blur(10px); text-align: center;
}
.semana-grid {
  display: flex; justify-content: space-around; flex-wrap: wrap; gap: 15px; margin-top: 20px;
}
.dia-card {
  background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; min-width: 100px;
  border: 1px solid transparent; transition: 0.3s;
}
.dia-card.tem-aula { border-color: var(--verde); box-shadow: 0 0 15px rgba(45,122,45,0.4); }
.dia-card.sem-aula { border-color: #ff4d4d33; opacity: 0.7; }

.status-icon { font-size: 24px; margin-top: 10px; }
.dia-nome { font-weight: 700; color: var(--ouro); text-transform: uppercase; font-size: 12px; }

/* MURAL */
.mural-grid{
  display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:25px;max-width:1200px;margin:0 auto 80px;padding:0 20px;
}
.mural-card{background:var(--glass);border-radius:20px;overflow:hidden;border:1px solid var(--border);position:relative;}
.mural-card img{width:100%;height:300px;object-fit:cover;}

/* ADMIN */
.admin-trigger{position:fixed;bottom:20px;right:20px;background:var(--ouro);width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;}
#admin-panel{position:fixed;bottom:80px;right:20px;background:var(--g2);padding:20px;border-radius:20px;border:1px solid var(--ouro);display:none;z-index:100;width:320px;}
.admin-panel input, .admin-panel button{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;}
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<header>
  <h1>Rede de Saberes</h1>
  <p>Cronograma de Informática e Mural</p>
</header>

<div class="calendario-container">
  <h2 style="color:var(--ouro)">📅 Aulas desta Semana</h2>
  <div class="semana-grid" id="semana-display">
    </div>
</div>

<div class="mural-grid" id="mural-container"></div>

<div class="admin-trigger" onclick="toggleAdmin()">🔑</div>
<div id="admin-panel" class="admin-panel">
  <h4 style="color:var(--ouro);margin-bottom:10px">Painel Admin</h4>
  <input type="password" id="senha-admin" placeholder="Senha KOKAMA2026">
  
  <p style="font-size:12px;margin-bottom:5px">Marcar dias de aula:</p>
  <div id="admin-check-dias" style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:15px;font-size:12px">
    </div>
  <button onclick="salvarAgenda()" style="background:var(--verde);color:white;border:none">Atualizar Agenda</button>
  <hr style="opacity:0.2;margin-bottom:15px">
  <input type="file" id="file-input" accept="image/*">
  <button onclick="iniciarUpload()" style="background:var(--ouro);color:var(--g1);border:none;font-weight:bold">Subir Foto Mural</button>
  <div id="status-msg" style="font-size:11px;color:var(--ouro)"></div>
</div>

<script>
const scriptURL = "SUA_URL_AQUI"; // COLOQUE SUA URL
const DIAS_NOMES = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
let aulasAtivas = [];

function toggleAdmin(){
  const p = document.getElementById('admin-panel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
  gerarChecksAdmin();
}

// Gera os dias da semana atual
function getDiasSemanaAtual() {
  const hoje = new Date();
  const primeiro = hoje.getDate() - hoje.getDay();
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(hoje.setDate(primeiro + i));
    return d.toISOString().split('T')[0];
  });
}

function renderCalendario(aulas) {
  const container = document.getElementById('semana-display');
  const dias = getDiasSemanaAtual();
  
  container.innerHTML = dias.map(dataStr => {
    const temAula = aulas.includes(dataStr);
    const dataObj = new Date(dataStr + "T00:00:00");
    return `
      <div class="dia-card ${temAula ? 'tem-aula' : 'sem-aula'}">
        <div class="dia-nome">${DIAS_NOMES[dataObj.getDay()]}</div>
        <div style="font-size:10px; opacity:0.6">${dataObj.getDate()}/${dataObj.getMonth()+1}</div>
        <div class="status-icon">${temAula ? '✅' : '❌'}</div>
        <div style="font-size:10px; margin-top:5px">${temAula ? 'TEM AULA' : 'SEM AULA'}</div>
      </div>
    `;
  }).join('');
}

function gerarChecksAdmin() {
  const container = document.getElementById('admin-check-dias');
  const dias = getDiasSemanaAtual();
  container.innerHTML = dias.map(d => `
    <label><input type="checkbox" value="${d}" ${aulasAtivas.includes(d) ? 'checked' : ''}> ${d.split('-')[2]}/${d.split('-')[1]}</label>
  `).join('');
}

async function salvarAgenda() {
  const senha = document.getElementById('senha-admin').value;
  const selecionados = Array.from(document.querySelectorAll('#admin-check-dias input:checked')).map(i => i.value);
  
  const resp = await fetch(scriptURL, {
    method: 'POST',
    body: JSON.stringify({ action: 'saveAulas', senha, datas: selecionados })
  });
  if((await resp.json()).ok) { alert("Agenda Atualizada!"); carregarDados(); }
}

async function carregarDados() {
  const resp = await fetch(scriptURL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getData', senha: 'KOKAMA2026' }) 
  });
  const data = await resp.json();
  aulasAtivas = data.aulas || [];
  renderCalendario(aulasAtivas);
  renderMural(data.mural);
}

// ... (Funções de Upload e Mural permanecem as mesmas da versão anterior) ...
function renderMural(lista) {
  document.getElementById('mural-container').innerHTML = lista.map(img => `
    <div class="mural-card">
      <img src="${img.url}">
      <button onclick="deletar('${img.id}')" style="position:absolute;top:5px;right:5px;background:red;color:white;border:none;border-radius:5px;cursor:pointer">X</button>
    </div>
  `).join('');
}

async function iniciarUpload() {
  const file = document.getElementById('file-input').files[0];
  const senha = document.getElementById('senha-admin').value;
  if(!file || !senha) return alert("Falta foto ou senha");

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const resp = await fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify({ action: 'upload', senha, base64, name: file.name, type: file.type })
    });
    const res = await resp.json();
    if(res.ok) renderMural(res.mural);
  };
  reader.readAsDataURL(file);
}

carregarDados();
/* ... Reinsira aqui seu código JS de animação do Canvas que você já tem ... */
</script>
</body>
</html>
